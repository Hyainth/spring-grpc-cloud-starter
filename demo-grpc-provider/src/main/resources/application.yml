server:
  port: 8081

spring:
  application:
    name: demo-grpc-provider
  config:
    import: optional:nacos:demo-grpc-provider.yaml?group=${NACOS_GROUP}&refreshEnabled=false
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR}
        username: ${NACOS_USERNAME}
        password: ${NACOS_PASSWORD}
        namespace: ${NACOS_NAMESPACE}
        group: ${NACOS_GROUP}
      config:
        server-addr: ${NACOS_SERVER_ADDR}
        username: ${NACOS_USERNAME}
        password: ${NACOS_PASSWORD}
        namespace: ${NACOS_NAMESPACE}
        group: ${NACOS_GROUP}
  grpc:
    server:
      port: 9091

management:
  endpoints:
    web:
      exposure:
        include: health,info

demo:
logging:
  level:
    com.github.hyacinth.demo.provider: INFO
    com.alibaba.nacos: INFO
